networks:
  db-data-network:
    driver: bridge
services:
  mysql-compose:
    image: difuz1x/mysql-local:1.0.0 
    build:
      context: .
      dockerfile: Dockerfile.mysql
    ports: 
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: 1234
    volumes: 
      - MySQL-local:/var/lib/mysql
    networks:
      - db-data-network
    restart: unless-stopped
    container_name: mysql-compose
  pythonapp:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on: 
      - mysql
    ports: 
      - "8080:8080"
    environment:
      - ENV=local
    restart: unless-stopped
    container_name: pythonapp-compose
    networks: 
      - db-data-network

volumes:
  MySQL-local:


